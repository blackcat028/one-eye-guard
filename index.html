<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>One Eye Guard</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      user-select: none;
    }

    /* Subtle scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.015) 2px,
        rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── CENTER TEXT ── */
    .center-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 0 32px;
      width: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .center-text h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 6vw, 3rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .center-text p {
      font-family: 'Orbitron', sans-serif;
      font-weight: 400;
      font-size: clamp(0.58rem, 2vw, 0.82rem);
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.42);
      line-height: 2;
      text-transform: uppercase;
      max-width: 480px;
      margin: 0 auto;
    }
    
    /* ── EYE ── */
.eye-wrap {
  position: fixed;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 5;
}

.eye-svg {
  width: 160px;
  height: 80px;
  overflow: visible;
}

    /* ── SLIDER ── */
    .slider-wrap {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      width: min(88vw, 360px);
      height: 62px;
      border: 2px solid #fff;
      border-radius: 999px;
      display: flex;
      align-items: center;
      padding: 4px;
      z-index: 10;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(4px);
    }

    .slider-fill {
      position: absolute;
      left: 4px;
      top: 4px;
      bottom: 4px;
      width: 0%;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      transition: width 0.05s linear;
      pointer-events: none;
    }

    .slider-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.3s;
      text-transform: uppercase;
    }

    .slider-thumb {
      position: absolute;
      left: 4px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      z-index: 2;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      touch-action: none;
      will-change: left;
      box-shadow: 0 0 0 0 rgba(255,255,255,0);
    }

    .slider-thumb:active { cursor: grabbing; }

    .slider-thumb svg {
      width: 22px;
      height: 22px;
      fill: #000;
    }

    .slider-thumb.dragging {
      box-shadow: 0 0 18px 4px rgba(255,255,255,0.35);
    }

    .slider-wrap.success .slider-thumb {
      box-shadow: 0 0 28px 8px rgba(255,255,255,0.6);
    }

    .slider-wrap.success .slider-label {
      opacity: 0;
    }

    .slider-thumb.snap {
      transition: left 0.45s cubic-bezier(0.25, 1.4, 0.5, 1);
    }

    /* Flash overlay */
    .flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.25s ease;
    }
    .flash.active { opacity: 1; }
    
    .cursor {
  display: inline-block;
  animation: blink-cursor 0.7s step-end infinite;
  color: #fff;
  font-weight: 300;
}
@keyframes blink-cursor {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

  </style>
</head>
<body>

  <div class="flash" id="flash"></div>

  <!-- ✏️ EDIT JUDUL & PARAGRAF DI SINI -->
    
    <!-- 👁️ MATA -->
<div class="eye-wrap">
  <svg class="eye-svg" viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="eyeClip">
        <path d="M5,40 Q80,2 155,40 Q80,78 5,40 Z"/>
      </clipPath>
    </defs>
    <!-- outline kelopak atas -->
    <path d="M5,40 Q80,2 155,40"
          fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    <!-- outline kelopak bawah -->
    <path d="M5,40 Q80,78 155,40"
          fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    <!-- isi mata di-clip -->
    <g clip-path="url(#eyeClip)">
      <circle id="pupil"     cx="80" cy="40" r="20" fill="#fff"/>
      <circle id="pupilDark" cx="80" cy="40" r="11" fill="#000"/>
      <!-- blink kelopak atas -->
      <path id="blink" d="M5,40 Q80,2 155,40 L155,40 Q80,2 5,40 Z" fill="#000"/>
    </g>
  </svg>
</div>
<!-- ========= -->

<div class="center-text">
    
    <h1><span id="typedTitle"></span><span class="cursor" id="cursorTitle">|</span></h1>
    <p><span id="typedDesc"></span><span class="cursor" id="cursorDesc" style="display:none">|</span></p>
  </div>
  <!-- ================================= -->

  <div class="slider-wrap" id="sliderWrap">
    <div class="slider-fill" id="sliderFill"></div>
    <span class="slider-label" id="sliderLabel">Swipe to Enter</span>
    <div class="slider-thumb" id="sliderThumb">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M5.59 7 4 8.41 8.58 13 4 17.59 5.59 19l6-6z"/>
        <path d="M11.59 7 10 8.41 14.58 13 10 17.59 11.59 19l6-6z"/>
      </svg>
    </div>
  </div>

  <script>
    // =====================
    // 🔗 SET URL DI SINI
    // =====================
    const TARGET_URL = "https://blackcat028.github.io/future-time-/";
    // =====================

    const wrap = document.getElementById('sliderWrap');
    const thumb = document.getElementById('sliderThumb');
    const fill = document.getElementById('sliderFill');
    const label = document.getElementById('sliderLabel');
    const flash = document.getElementById('flash');

    const THUMB_SIZE = 54;
    const PADDING = 4;

    let isDragging = false;
    let startX = 0;
    let currentLeft = PADDING;

    function getMaxLeft() {
      return wrap.offsetWidth - THUMB_SIZE - PADDING;
    }

    function setThumbPos(px) {
      const max = getMaxLeft();
      const clamped = Math.max(PADDING, Math.min(px, max));
      thumb.style.left = clamped + 'px';
      const pct = ((clamped - PADDING) / (max - PADDING)) * 100;
      fill.style.width = pct + '%';
      label.style.opacity = pct > 20 ? Math.max(0, 1 - pct / 60) : 1;
      return { clamped, max, pct };
    }

    function onStart(e) {
      isDragging = true;
      thumb.classList.add('dragging');
      thumb.classList.remove('snap');
      startX = (e.touches ? e.touches[0].clientX : e.clientX);
      currentLeft = thumb.offsetLeft;
      e.preventDefault();
    }

    function onMove(e) {
      if (!isDragging) return;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const delta = clientX - startX;
      const newLeft = currentLeft + delta;
      const { pct } = setThumbPos(newLeft);
      if (pct >= 92) triggerSuccess();
    }

    function onEnd() {
      if (!isDragging) return;
      isDragging = false;
      thumb.classList.remove('dragging');
      snapBack();
    }

    function snapBack() {
      thumb.classList.add('snap');
      thumb.style.left = PADDING + 'px';
      fill.style.width = '0%';
      label.style.opacity = 1;
      setTimeout(() => thumb.classList.remove('snap'), 450);
    }

    function triggerSuccess() {
      isDragging = false;
      thumb.classList.remove('dragging');
      wrap.classList.add('success');
      thumb.style.left = getMaxLeft() + 'px';
      fill.style.width = '100%';
      setTimeout(() => {
        flash.classList.add('active');
        setTimeout(() => { window.location.href = TARGET_URL; }, 280);
      }, 200);
    }

    thumb.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    thumb.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
    
    // ── EYE ANIMATION ──
const pupil     = document.getElementById('pupil');
const pupilDark = document.getElementById('pupilDark');
const blink     = document.getElementById('blink');

function movePupil(dx, dy, force = false) {
  const mx = 18, my = 12;
  const x = Math.max(-mx, Math.min(mx, dx));
  const y = Math.max(-my, Math.min(my, dy));
  pupil.setAttribute('cx', 80 + x);
  pupil.setAttribute('cy', 40 + y);
  pupilDark.setAttribute('cx', 80 + x);
  pupilDark.setAttribute('cy', 40 + y);
}

const gazeDir = [[0,0],[18,0],[-18,0],[0,-12],[0,12],[14,-9],[-14,9],[12,10],[-12,-9],[0,0]];
let gazeIdx = 0;
let isBlinking = false;
function nextGaze() {
  const [dx, dy] = gazeDir[gazeIdx % gazeDir.length];
  movePupil(dx, dy);
  gazeIdx++;
  setTimeout(nextGaze, 1500 + Math.random() * 2500);
}
setTimeout(nextGaze, 600);

function doBlink() {
  const closeSteps = [2, 5, 9, 14, 20, 27, 34, 42, 50, 58, 66, 73, 78];
  const openSteps  = [78, 73, 66, 58, 50, 42, 34, 27, 20, 14, 9, 5, 2];

  isBlinking = true;
  let i = 0;
  const close = setInterval(() => {
    const cy = closeSteps[i];
    blink.setAttribute('d', `M5,40 Q80,${cy} 155,40 L155,40 Q80,2 5,40 Z`);
    i++;
    if (i >= closeSteps.length) {
      clearInterval(close);

      // pindah arah pandang pas mata nutup total
      const randomGaze = gazeDir[Math.floor(Math.random() * gazeDir.length)];
      movePupil(randomGaze[0], randomGaze[1], true);

      let j = 0;
      const open = setInterval(() => {
        const cy2 = openSteps[j];
        blink.setAttribute('d', `M5,40 Q80,${cy2} 155,40 L155,40 Q80,2 5,40 Z`);
        j++;
        if (j >= openSteps.length) {
          clearInterval(open);
          isBlinking = false; // baru boleh gerak lagi
        }
      }, 18);
    }
  }, 18);

  setTimeout(doBlink, 2500 + Math.random() * 3000);
}
setTimeout(doBlink, 1500);

// ── TYPEWRITER ──
const TITLE_TEXT = "WELCOME TO MY WEBSITE";
const DESC_TEXT  = "This is my first unique website. I created it for my future self—if you're curious, feel free to check it out.";

const typedTitle   = document.getElementById('typedTitle');
const typedDesc    = document.getElementById('typedDesc');
const cursorTitle  = document.getElementById('cursorTitle');
const cursorDesc   = document.getElementById('cursorDesc');

function typeText(el, text, speed, onDone) {
  let i = 0;
  const interval = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      if (onDone) onDone();
    }
  }, speed);
}

// judul mulai SETELAH loader selesai
setTimeout(() => {
typeText(typedTitle, TITLE_TEXT, 80, () => {
  // cursor judul berhenti kedip, pindah ke paragraf
  cursorTitle.style.display = 'none';
  cursorDesc.style.display  = 'inline-block';
  setTimeout(() => {
    typeText(typedDesc, DESC_TEXT, 40, () => {
      // selesai semua, cursor paragraf berhenti kedip
      setTimeout(() => { cursorDesc.style.animation = 'none'; cursorDesc.style.opacity = '0'; }, 1000);
    });
  }, 400);
});
}, 300);
  </script>
  
</body>
</html>
